<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Foodie Login</title>
</head>

<body style="margin:0;
             padding:0;
             font-family:Arial,sans-serif;
             background:#f4f4f4;
             display:flex;
             justify-content:center;
             align-items:center;
             height:100vh;">

    <div style="width:350px;
                background:white;
                padding:30px;
                border-radius:15px;
                box-shadow:0px 4px 10px rgba(0,0,0,0.2);">

        <h1 style="text-align:center;
                   color:#ff6b35;
                   margin-bottom:25px;">
            🍴 Foodie Login
        </h1>

        <form action="callloginservlet" method="post">

            <label style="font-weight:bold;">
                Username
            </label>
            <input type="text"
                   name="username"
                   required
                   style="width:100%;
                          padding:10px;
                          margin-top:5px;
                          margin-bottom:15px;
                          border:1px solid #ccc;
                          border-radius:8px;">

            <label style="font-weight:bold;">
                Password
            </label>
            <input type="password"
                   name="password"
                   required
                   style="width:100%;
                          padding:10px;
                          margin-top:5px;
                          margin-bottom:20px;
                          border:1px solid #ccc;
                          border-radius:8px;">

            <button type="submit"
                    style="width:100%;
                           padding:12px;
                           background:#28a745;
                           color:white;
                           border:none;
                           border-radius:8px;
                           font-size:16px;
                           cursor:pointer;">
                Login
            </button>

        </form>

        <p style="text-align:center;
                  margin-top:20px;">
            Don't have an account?
            <a href="register.html"
               style="color:#ff6b35;
                      text-decoration:none;
                      font-weight:bold;">
                Register
            </a>
        </p>

    </div>

</body>
</html>
